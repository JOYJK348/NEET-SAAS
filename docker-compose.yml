version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: neet-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: neet_user
      POSTGRES_PASSWORD: neet_password
      POSTGRES_DB: neet_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:alpine
    container_name: neet-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: always

  adminer:
    image: adminer
    container_name: neet-adminer
    ports:
      - '8080:8080'
    restart: always

  mailhog:
    image: mailhog/mailhog
    container_name: neet-mailhog
    ports:
      - '8025:8025'
      - '1025:1025'
    restart: always

volumes:
  postgres_data:
  redis_data:
